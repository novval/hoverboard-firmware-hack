name: Build with GNU ARM GCC 5.4.1

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install make and wget
      run: |
        sudo apt-get update
        sudo apt-get install -y make wget

    - name: Download and extract GCC
      run: |
        wget -q https://developer.arm.com/-/media/Files/downloads/gnu-rm/5_4-2016q3/gcc-arm-none-eabi-5_4-2016q3-20160926-linux.tar.bz2
        tar -xjf gcc-arm-none-eabi-5_4-2016q3-20160926-linux.tar.bz2
        echo "$(pwd)/gcc-arm-none-eabi-5_4-2016q3/bin" >> $GITHUB_PATH

    - name: Verify compiler version
      run: arm-none-eabi-gcc --version

    - name: Build project
      run: make

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hoverboard-firmware
        path: build/hover.*
        
